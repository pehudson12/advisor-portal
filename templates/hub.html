{% extends "base.html" %}
{% block title %}Medical Advisors Hub{% endblock %}
{% block body %}
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img class="brand-logo" src="/static/unity-logo.svg" alt="UNITY" />
      <span class="brand-divider"></span>
      <span class="brand-text">Medical Advisors Hub</span>
    </div>
    <div class="topbar-right">
      <span class="user">{{ user }}</span>
      <a class="logout" href="/logout">Sign out</a>
    </div>
  </div>
</header>

<main class="content">
  {% include "_content.html" %}
</main>

<footer class="site-footer">
  <p>© BillionToOne — Confidential. For authorized medical advisors only.</p>
</footer>
{% endblock %}
