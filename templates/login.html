{% extends "base.html" %}
{% block title %}Sign in — Medical Advisors Hub{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">B1</div>
      <div class="brand-text">BillionToOne</div>
    </div>
    <h1>Medical Advisors Hub</h1>
    <p class="subtitle">Please sign in to continue.</p>

    {% if error %}
    <div class="alert" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" autocomplete="on">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus
             autocomplete="username" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required
             autocomplete="current-password" placeholder="••••••••" />

      <button type="submit">Sign in</button>
    </form>

    <p class="foot">Access is restricted to authorized BillionToOne medical advisors.</p>
  </div>
</div>
{% endblock %}
